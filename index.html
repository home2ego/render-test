<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Render Test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background-image: linear-gradient(to bottom, #212529, #000);
        overscroll-behavior: none;
        color: #fafafa;
        margin: 0;
        height: 100vh;
      }
      h1 {
        margin: 0;
        color: royalblue;
      }
      p {
        margin: 0;
        padding-block: 20px;
      }
      button {
        all: unset;
        box-sizing: border-box;
        outline: revert;
        font: inherit;
        cursor: pointer;

        padding: 15px;
        border-radius: 6px;
        border: 1.5px solid #4338ca;

        background-color: #171717;
        color: #fafafa;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <script type="module" src="./index.js"></script>
  </body>
</html>
